name: CI

# main 푸시 / PR 에서 빌드가 깨지지 않는지 확인 (태그 배포 전 안전망)
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Smoke test (인증 없이 되는 것만)
        run: |
          node dist/sync.js --version
          node dist/sync.js --help > /dev/null
